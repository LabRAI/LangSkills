sources:
  # Tier1: stable, official-ish docs that can run for days/weeks
  - id: linux_tier1_web
    type: http_seed_crawl
    domain: linux
    seeds:
      - https://man7.org/linux/man-pages/index.html
      - https://www.gnu.org/software/coreutils/manual/coreutils.html
      - https://wiki.archlinux.org/
      - https://pubs.opengroup.org/onlinepubs/9699919799/
    refresh:
      mode: ttl
      interval: 7d
    purpose: primary
    allowlist: true
    license_policy: "manual_review_per_page (record License field in sources.md; no verbatim copy)"

  - id: linux_tier1_web_extra
    type: http_seed_crawl
    domain: linux
    seeds:
      - https://man.archlinux.org/
      - https://manpages.debian.org/
      - https://wiki.debian.org/
      - https://www.freedesktop.org/software/systemd/man/
      - https://curl.se/docs/
      - https://docs.kernel.org/
    refresh:
      mode: ttl
      interval: 14d
    purpose: primary
    allowlist: true
    license_policy: "manual_review_per_page (record License field in sources.md; no verbatim copy)"

  - id: productivity_tier1_web
    type: http_seed_crawl
    domain: productivity
    seeds:
      - https://www.icmje.org/recommendations/
      - https://www.nsf.gov/pubs/policydocs/pappg/index.jsp
      - https://www.nih.gov/grants-funding
      - https://owl.purdue.edu/
    refresh:
      mode: ttl
      interval: 14d
    purpose: primary
    allowlist: true
    license_policy: "manual_review_per_page (record License field in sources.md; no verbatim copy)"

  - id: integrations_slack_docs
    type: http_seed_crawl
    domain: integrations
    seeds:
      - https://api.slack.com/
    refresh:
      mode: ttl
      interval: 7d
    purpose: primary
    allowlist: true
    license_policy: "manual_review_per_page (record License field in sources.md; no verbatim copy)"

  - id: integrations_github_docs
    type: http_seed_crawl
    domain: integrations
    seeds:
      - https://docs.github.com/en/rest/issues/issues
      - https://docs.github.com/en/authentication
      - https://docs.github.com/en/rest/using-the-rest-api
    refresh:
      mode: ttl
      interval: 14d
    purpose: primary
    allowlist: true
    license_policy: "manual_review_per_page (record License field in sources.md; no verbatim copy)"

  - id: web_react_docs
    type: http_seed_crawl
    domain: web
    seeds:
      - https://react.dev/learn
      - https://react.dev/reference/react
    refresh:
      mode: ttl
      interval: 14d
    purpose: primary
    allowlist: true
    license_policy: "manual_review_per_page (record License field in sources.md; no verbatim copy)"

  - id: cloud_kubernetes_docs
    type: http_seed_crawl
    domain: cloud
    seeds:
      - https://kubernetes.io/docs/
      - https://kubernetes.io/docs/reference/kubectl/
    refresh:
      mode: ttl
      interval: 14d
    purpose: primary
    allowlist: true
    license_policy: "manual_review_per_page (record License field in sources.md; no verbatim copy)"

  - id: data_duckdb_docs
    type: http_seed_crawl
    domain: data
    seeds:
      - https://duckdb.org/docs/
    refresh:
      mode: ttl
      interval: 14d
    purpose: primary
    allowlist: true
    license_policy: "manual_review_per_page (record License field in sources.md; no verbatim copy)"

  - id: travel_airport_codes_public
    type: http_seed_crawl
    domain: travel
    seeds:
      - https://ourairports.com/data/
      - https://www.wikidata.org/wiki/Property:P238
      - https://www.wikidata.org/wiki/Property:P239
      - https://en.wikipedia.org/wiki/IATA_airport_code
    refresh:
      mode: ttl
      interval: 30d
    purpose: primary
    allowlist: true
    license_policy: "manual_review_per_page (record License field in sources.md; no verbatim copy)"

  - id: devtools_git_docs
    type: http_seed_crawl
    domain: devtools
    seeds:
      - https://git-scm.com/docs
      - https://www.kernel.org/pub/software/scm/git/docs/
    refresh:
      mode: ttl
      interval: 30d
    purpose: primary
    allowlist: true
    license_policy: "manual_review_per_page (record License field in sources.md; no verbatim copy)"

  # Tier0: upstream “skills repos/spec” (reference-only ingest; do not verbatim copy)
  - id: upstream_anthropic_skills
    type: github_repo
    repo: anthropics/skills
    branch: main
    include_globs:
      - "skills/**/SKILL.md"
      - "README.md"
      - "docs/**"
    purpose: reference_only
    allowlist: true
    license_policy: "check_repo_license + per-file scan; ingest as evidence + mapping, not copy"
    refresh:
      mode: git_commit
      interval: 2d

  - id: upstream_claude_scientific_skills
    type: github_repo
    repo: K-Dense-AI/claude-scientific-skills
    branch: main
    include_globs:
      - "scientific-skills/**/SKILL.md"
      - "README.md"
      - "docs/**"
      - "LICENSE.md"
    purpose: reference_only
    allowlist: true
    license_policy: "check_repo_license + per-file scan; ingest as evidence + mapping, not copy"
    refresh:
      mode: git_commit
      interval: 7d

  - id: upstream_context_engineering_skills
    type: github_repo
    repo: muratcankoylan/Agent-Skills-for-Context-Engineering
    branch: main
    include_globs:
      - "skills/**/SKILL.md"
      - "README.md"
      - "docs/**"
      - "LICENSE"
    purpose: reference_only
    allowlist: true
    license_policy: "check_repo_license + per-file scan; ingest as evidence + mapping, not copy"
    refresh:
      mode: git_commit
      interval: 7d

  - id: upstream_agentskills_spec
    type: github_repo
    repo: agentskills/agentskills
    branch: main
    include_globs:
      - "README.md"
      - "docs/**"
      - "skills-ref/**"
    purpose: reference_only
    allowlist: true
    license_policy: "check_repo_license + per-file scan; ingest as evidence + mapping, not copy"
    refresh:
      mode: git_commit
      interval: 7d
