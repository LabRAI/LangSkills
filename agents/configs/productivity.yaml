    - usgs.gov
    - icmje.org
    - hmc.edu
    - frontiersin.org
    - csusb.edu
    - cmu.edu
    - berkeley.edu
    - sulab.org
    - nih.gov
    - purdue.edu
    - plos.org
    - cornell.edu
    - stanford.edu
    - ncsu.edu
    - harvard.edu
    - upenn.edu
    - kennesaw.edu
  deny_domains: []

