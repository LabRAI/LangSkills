name: link-check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.md"
  schedule:
    - cron: "0 3 * * 0"

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --no-progress
            --accept 200,429
            --max-retries 2
            --timeout 20
            .

