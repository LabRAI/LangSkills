name: eval

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 0"

permissions:
  contents: write

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run eval harness (offline)
        id: eval
        shell: bash
        run: |
          set +e
          node eval/harness/run.js \
            --tasks "eval/tasks/linux/smoke.json" \
            --out "eval/reports/latest/report.json" \
            --out-md "eval/reports/latest/report.md" \
            --fail-on-stale-gold
          code=$?
          echo "exitcode=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            eval/reports/latest/report.json
            eval/reports/latest/report.md
      - name: Publish weekly eval report to GitHub Release
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ ! -f "eval/reports/latest/report.json" || ! -f "eval/reports/latest/report.md" ]]; then
            echo "[warn] missing eval report files; skipping Release publish"
            exit 0
          fi
          tag="eval-$(date -u +%Y-%m-%d)"
          title="Weekly Eval ${tag}"
          notes="Automated weekly eval report for ${tag}. Build: ${{ github.sha }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              "eval/reports/latest/report.json" \
              "eval/reports/latest/report.md" \
              --clobber
          else
            gh release create "$tag" \
              "eval/reports/latest/report.json" \
              "eval/reports/latest/report.md" \
              --title "$title" \
              --notes "$notes"
          fi
      - name: Gate
        if: steps.eval.outputs.exitcode != '0'
        run: exit 1
