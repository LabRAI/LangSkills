name: ci

on:
  pull_request:
  push:

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate skill structure
        run: node scripts/validate-skills.js --strict
      - name: Build static site (sanity)
        run: node scripts/build-site.js --out website/dist
