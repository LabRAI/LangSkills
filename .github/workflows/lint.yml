name: lint

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.yaml"
      - "**/*.yml"
      - "scripts/**/*.js"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Basic validation (structure)
        run: node scripts/validate-skills.js

